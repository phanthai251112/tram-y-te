<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trạm Quét Y Tế Tự Động - VIC Group</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        #login-screen { background: white; color: black; max-width: 350px; margin: 100px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #login-screen h2 { margin-top: 0; color: #0078d4; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #btn-login { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #login-error { color: red; font-size: 13px; display: none; margin-top: 10px; }
        #app-screen { display: none; }
        #video-container { position: relative; display: inline-block; margin-top: 15px; }
        video { border-radius: 10px; border: 3px solid #0078d4; width: 640px; }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 100; min-width: 300px;}
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { font-weight: bold; font-size: 14px; color: #333; }
        .form-group input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-luu { background: #0078d4; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-bo-qua { background: #ccc; padding: 10px; width: 100%; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .link-nav { display: inline-block; margin: 15px 10px; color: #5bc0de; text-decoration: none; font-size: 14px; cursor: pointer; }
        .coso-tag { display: inline-block; background: #e2e8f0; color: #475569; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-bottom: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
        <input type="email" id="email" class="login-input" placeholder="Email quản trị">
        <input type="password" id="password" class="login-input" placeholder="Mật khẩu">
        <button id="btn-login" onclick="login()">Vào Trạm Y Tế</button>
        <p id="login-error">Sai email hoặc mật khẩu!</p>
    </div>

    <div id="app-screen">
        <h2>HỆ THỐNG QUÉT MẶT Y TẾ TỰ ĐỘNG</h2>
        <div id="status">Đang tải dữ liệu học sinh từ Cloud...</div>

        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
        </div>
        
        <br>
        <a href="nhap_lieu.html" class="link-nav" target="_blank">⚙️ Chuyển sang Cổng Nhập Liệu</a>
        <span class="link-nav" onclick="logout()" style="color: #d9534f;">🚪 Đăng xuất</span>

        <div id="popup">
            <div class="coso-tag" id="student-coso">Cơ sở...</div>
            <h3 style="margin-top: 0;">Phát hiện: <span id="student-name" style="color: #d9534f;">...</span></h3>
            <p style="margin-top: -10px; color: #666;">Lớp: <span id="student-class" style="font-weight: bold;">...</span></p>
            <div class="form-group">
                <label>Tình trạng / Tên bệnh *</label>
                <input type="text" id="input-benh" placeholder="VD: Sốt 38 độ, Đau bụng...">
            </div>
            <div class="form-group">
                <label>Thuốc/Vật tư đã cấp</label>
                <input type="text" id="input-thuoc" placeholder="VD: 2 viên Panadol, 1 Urgo...">
            </div>
            <button class="btn-luu" onclick="submitHealthData()">Lưu Sổ Y Tế</button>
            <button class="btn-bo-qua" onclick="closePopup()">Bỏ qua (Quét lại)</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6WjhvvRqT-yUv5tj54wyyBNlN8dWZZB0",
        authDomain: "yte-hoc-duong.firebaseapp.com",
        projectId: "yte-hoc-duong",
        storageBucket: "yte-hoc-duong.firebasestorage.app",
        messagingSenderId: "400060011950",
        appId: "1:400060011950:web:a8e6512ab6d18b29cde43f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); 
    
    // ĐỪNG QUÊN DÁN LẠI LINK GOOGLE SCRIPT MỚI VÀO ĐÂY:
    const GOOGLE_SHEET_URL = "DÁN_LINK_APP_SCRIPT_VÀO_ĐÂY";

    const video = document.getElementById('video');
    const popup = document.getElementById('popup');
    let labeledFaceDescriptors = [];
    let isScanning = true;
    let detectedStudent = null;
    let isAiLoaded = false; 

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            if (!isAiLoaded) initAiAndCamera();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app-screen').style.display = 'none';
        }
    });

    window.login = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(() => document.getElementById('login-error').style.display = 'block');
    }

    window.logout = () => { if(confirm("Bạn muốn đăng xuất?")) signOut(auth).then(() => window.location.reload()); }

    async function initAiAndCamera() {
        isAiLoaded = true;
        document.getElementById('status').innerText = "Đang tải bộ não AI & Dữ liệu học sinh...";
        
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
        await faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
        await faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');

        const querySnapshot = await getDocs(collection(db, "DuLieuKhuonMat"));
        labeledFaceDescriptors = querySnapshot.docs.map(doc => {
            const data = doc.data();
            // Gắn tên Cơ sở vào nhãn AI để lúc quét nó đọc được
            const coSo = data.coSo || "CS1 Trường TH-THCS VICTORIA THĂNG LONG";
            return new faceapi.LabeledFaceDescriptors(`${data.ten}|${data.lop}|${coSo}`, [new Float32Array(data.descriptor)]);
        });

        if (labeledFaceDescriptors.length === 0) {
            document.getElementById('status').innerText = "Chưa có dữ liệu học sinh. Hãy sang cổng Nhập liệu!";
            return;
        }
        
        navigator.mediaDevices.getUserMedia({ video: {} }).then(stream => {
            video.srcObject = stream;
            document.getElementById('status').innerText = "Hệ thống đang quét mặt...";
            recognizeFaces();
        }).catch(err => alert("Không bật được Camera!"));
    }

    async function recognizeFaces() {
        const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
        setInterval(async () => {
            if (!isScanning) return;
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
            detections.forEach(fd => {
                const result = faceMatcher.findBestMatch(fd.descriptor);
                if (result.label !== 'unknown') {
                    // Cắt nhãn AI ra thành 3 phần: Tên, Lớp, Cơ sở
                    const [ten, lop, coSo] = result.label.split('|');
                    showPopup(ten, lop, coSo);
                }
            });
        }, 1000);
    }

    function showPopup(ten, lop, coSo) {
        isScanning = false;
        detectedStudent = { ten, lop, coSo };
        document.getElementById('student-name').innerText = ten;
        document.getElementById('student-class').innerText = lop;
        document.getElementById('student-coso').innerText = coSo; // Hiện tên cơ sở lên góc popup
        popup.style.display = 'block';
        setTimeout(() => document.getElementById('input-benh').focus(), 100);
    }

    window.closePopup = () => {
        popup.style.display = 'none';
        isScanning = true;
        document.getElementById('input-benh').value = "";
        document.getElementById('input-thuoc').value = "";
    }

    window.submitHealthData = async () => {
        const benh = document.getElementById('input-benh').value.trim();
        const thuoc = document.getElementById('input-thuoc').value.trim();
        if (!benh) return alert("Vui lòng nhập tình trạng bệnh!");

        popup.style.display = 'none';
        document.getElementById('status').innerText = "Đang lưu vào sổ...";

        // Gửi thông tin Cơ Sở đi để Google Script biết đường bẻ ghi
        const payload = { 
            "CoSo": detectedStudent.coSo, 
            "TenHocSinh": detectedStudent.ten, 
            "Lop": detectedStudent.lop, 
            "TinhTrang": benh, 
            "Thuoc": thuoc || "Không dùng thuốc" 
        };

        try {
            await fetch(GOOGLE_SHEET_URL, {
                method: "POST", mode: "no-cors", cache: "no-cache",
                headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
            });
            alert("Đã ghi sổ y tế cho: " + detectedStudent.ten);
        } catch (e) {
            alert("Lỗi kết nối Google Sheets!");
        }
        
        document.getElementById('input-benh').value = "";
        document.getElementById('input-thuoc').value = "";
        isScanning = true;
        document.getElementById('status').innerText = "Hệ thống đang quét mặt...";
    }
</script>
</body>
</html>
